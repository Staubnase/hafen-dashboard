# nginx-Konfiguration für hafen.deine-domain.de
# Ersetze DEINE_DOMAIN durch die echte Domain.
# TomTom API Key in der Umgebungsvariable TOMTOM_API_KEY hinterlegen.

server {
    listen 443 ssl http2;
    server_name hafen.DEINE_DOMAIN.de;

    # SSL (von Certbot/Let's Encrypt automatisch befüllt)
    ssl_certificate     /etc/letsencrypt/live/hafen.DEINE_DOMAIN.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hafen.DEINE_DOMAIN.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/hafen-dashboard;
    index index.html;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # TomTom API Key via sub_filter injizieren (nie im Git-Repo speichern)
    # In /etc/environment oder nginx.conf: set $tomtom_key "DEIN_ECHTER_KEY";
    set $tomtom_key "DEIN_TOMTOM_API_KEY";
    sub_filter '__TOMTOM_API_KEY__' $tomtom_key;
    sub_filter_once on;
    sub_filter_types text/html;

    # Proxy: BSH Wasserstandsvorhersage
    location /api/bsh {
        proxy_pass https://gdi.bsh.de/ldproxy/rest/services/WaterLevelForecast/collections/waterlevelforecastdata/items/hamburg_st-pauli?f=json;
        proxy_ssl_server_name on;
        proxy_cache_valid 200 2m;
        add_header Cache-Control "max-age=120, private" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Proxy: Mobilithek Brückensperrmeldungen (Port 8443)
    location /api/mobilithek {
        set $mobilithek_url "https://mobilithek.info:8443/mobilithek/api/v1.0/subscription/981881661821800448/clientPullService?subscriptionID=981881661821800448";
        proxy_pass $mobilithek_url;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_cache_valid 200 2m;
        add_header Cache-Control "max-age=120, private" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Rate Limiting für API-Endpunkte (max 30 Req/Min pro IP)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    location /api/ {
        limit_req zone=api burst=10 nodelay;
    }

    # Statische Dateien mit langen Cache-Zeiten
    location ~* \.(css|js|woff2?|png|jpg|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # HTML immer frisch ausliefern
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Keine Logs für favicon/robots
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { return 200 "User-agent: *\nDisallow: /\n"; }
}

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name hafen.DEINE_DOMAIN.de;
    return 301 https://$host$request_uri;
}
