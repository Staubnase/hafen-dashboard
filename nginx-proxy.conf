# Hafen Dashboard — nginx Location Blocks
# Einfügen in den "Advanced"-Tab des Proxy Hosts im Nginx Proxy Manager.
#
# Diese Blöcke leiten API-Anfragen server-seitig weiter, sodass der Browser
# keine CORS-Probleme hat (CORS gilt nur für Browser-zu-Server Requests).

# BSH Wasserstandsvorhersage
location /proxy/bsh/ {
    proxy_pass https://wasserstand-nordsee.bsh.de/;
    proxy_ssl_server_name on;
    proxy_set_header Host wasserstand-nordsee.bsh.de;
    proxy_set_header Referer "";
    proxy_set_header User-Agent "Mozilla/5.0";
    add_header Access-Control-Allow-Origin *;
    add_header Cache-Control "max-age=300";
}

# HPA Brückensperrungen via Mobilithek
location /proxy/mobilithek/ {
    proxy_pass https://mobilithek.info:8443/;
    proxy_ssl_server_name on;
    proxy_set_header Host mobilithek.info;
    proxy_set_header Referer "";
    proxy_set_header User-Agent "Mozilla/5.0";
    add_header Access-Control-Allow-Origin *;
    add_header Cache-Control "max-age=60";
}
